<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catenary Scotland</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: Inter, system-ui, sans-serif;
      }

      .status {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 2;
        max-width: min(460px, calc(100vw - 28px));
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        box-shadow: 0 14px 44px rgba(15, 23, 42, 0.12);
      }

      .status h1 {
        margin: 0 0 6px;
        font-size: 24px;
        line-height: 1.1;
      }

      .status p {
        margin: 0;
        color: #475569;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="status">
      <h1>Scotland Transit</h1>
      <p>Bus-first vector tiles from Maple ingest, with rail detail layered underneath.</p>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
      async function loadStyle() {
        const response = await fetch("/static/light-style.json");
        const style = await response.json();
        delete style.sprite;
        return style;
      }

      function addTransitLayers(map) {
        const urlParams = new URLSearchParams(window.location.search);
        map.addSource("busshapes", {
          type: "vector",
          tiles: [`${window.location.origin}/birch/shapes_bus/{z}/{x}/{y}.pbf`],
          minzoom: 4,
          maxzoom: 16,
        });

        map.addSource("localcityrailshapes", {
          type: "vector",
          tiles: [`${window.location.origin}/birch/shapes_local_rail/{z}/{x}/{y}.pbf`],
          minzoom: 4,
          maxzoom: 16,
        });

        map.addSource("intercityrailshapes", {
          type: "vector",
          tiles: [`${window.location.origin}/birch/shapes_intercity_rail/{z}/{x}/{y}.pbf`],
          minzoom: 4,
          maxzoom: 16,
        });

        map.addSource("othershapes", {
          type: "vector",
          tiles: [`${window.location.origin}/birch/shapes_ferry/{z}/{x}/{y}.pbf`],
          minzoom: 4,
          maxzoom: 16,
        });

        map.addSource("harebell", {
          type: "vector",
          tiles: [`${window.location.origin}/tiles/{z}/{x}/{y}.pbf`],
          minzoom: 3,
          maxzoom: 16,
        });

        const lineColor = ["concat", "#", ["get", "color"]];
        const textColor = [
          "case",
          ["==", ["get", "color"], "000000"],
          "#ffffff",
          ["concat", "#", ["coalesce", ["get", "text_color"], "ffffff"]],
        ];
        const routeLabel = ["coalesce", ["get", "route_label"], ["get", "route_id"]];

        map.addLayer({
          id: "harebell-rail-aggregate",
          type: "line",
          source: "harebell",
          "source-layer": "transit",
          filter: [
            "all",
            [
              "any",
              ["==", 0, ["get", "route_type"]],
              ["==", 1, ["get", "route_type"]],
              ["==", 2, ["get", "route_type"]],
              ["==", 5, ["get", "route_type"]],
              ["==", 7, ["get", "route_type"]],
              ["==", 11, ["get", "route_type"]],
              ["==", 12, ["get", "route_type"]],
            ],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              5,
              0.8,
              7,
              1.4,
              9,
              2.2,
              11,
              2.8,
              15,
              3.6,
            ],
            "line-opacity": ["interpolate", ["linear"], ["zoom"], 5, 0.25, 8, 0.38, 12, 0.5],
          },
          minzoom: 5,
        });

        map.addLayer({
          id: "busshapes",
          type: "line",
          source: "busshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "950"],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Old Town to Airport Shuttle"],
              ],
            ],
            [
              "!",
              [
                "all",
                [
                  "any",
                  ["==", "autobús~interurbano~de~cataluña", ["get", "chateau"]],
                  ["==", "flixbus~europe", ["get", "chateau"]],
                  ["==", "f-ahverkehrsverbund~schleswig~holstein~nah", ["get", "chateau"]],
                ],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
            ["!=", ["get", "onestop_feed_id"], "f-u0-blablacar"],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": ["interpolate", ["linear"], ["zoom"], 7, 0.4, 10, 0.7, 12, 1, 14, 1.2, 15, 1.5],
            "line-opacity": ["interpolate", ["linear"], ["zoom"], 8, 0.05, 11, 0.3, 14, 0.5],
          },
          minzoom: 8,
        });

        map.addLayer({
          id: "bus-labels",
          type: "symbol",
          source: "busshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "950"],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Old Town to Airport Shuttle"],
              ],
            ],
            [
              "!",
              [
                "all",
                [
                  "any",
                  ["==", "autobús~interurbano~de~cataluña", ["get", "chateau"]],
                  ["==", "flixbus~europe", ["get", "chateau"]],
                  ["==", "f-ahverkehrsverbund~schleswig~holstein~nah", ["get", "chateau"]],
                ],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
            ["!=", ["get", "onestop_feed_id"], "f-u0-blablacar"],
          ],
          layout: {
            "symbol-placement": "line",
            "text-field": urlParams.get("debug")
              ? [
                  "concat",
                  ["get", "onestop_feed_id"],
                  "|",
                  ["get", "shape_id"],
                  "|",
                  ["coalesce", ["get", "route_label"]],
                ]
              : ["coalesce", ["get", "route_label"]],
            "text-font": ["literal", ["NotoSans-Regular"]],
            "text-size": ["interpolate", ["linear"], ["zoom"], 10, 5, 11, 7, 13, 10],
            "text-ignore-placement": false,
            "symbol-spacing":
              window.innerWidth > 750
                ? ["step", ["zoom"], 200, 12, 100, 13, 100, 15, 120, 20, 150]
                : ["step", ["zoom"], 200, 12, 80, 13, 100, 15, 100, 20, 150],
            "text-allow-overlap": false,
            "text-pitch-alignment": "viewport",
            "visibility": "none",
          },
          paint: {
            "text-color": ["concat", "#", ["get", "text_color"]],
            "text-halo-color": lineColor,
            "text-halo-width": 2,
            "text-halo-blur": 0,
          },
          minzoom: 11,
        });

        map.addLayer({
          id: "othershapes",
          type: "line",
          source: "othershapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "!",
              [
                "all",
                ["==", "schweiz", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
            [
              "any",
              ["==", 6, ["get", "route_type"]],
              ["==", 7, ["get", "route_type"]],
            ],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": ["interpolate", ["linear"], ["zoom"], 7, 2, 9, 3],
            "line-opacity": 1,
          },
          minzoom: 3,
        });

        map.addLayer({
          id: "other-labels",
          type: "symbol",
          source: "othershapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "any",
              ["==", 4, ["get", "route_type"]],
              ["==", 6, ["get", "route_type"]],
              ["==", 7, ["get", "route_type"]],
            ],
            [
              "!",
              [
                "all",
                ["==", "schweiz", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
          ],
          layout: {
            "symbol-placement": "line",
            "text-field": routeLabel,
            "text-font": ["NotoSans-Medium"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 3, 7, 9, 9, 13, 11],
            "text-ignore-placement": false,
            "symbol-spacing": ["step", ["zoom"], 20, 6, 40, 9, 70, 13, 80, 15, 100],
            "text-allow-overlap": false,
            "text-pitch-alignment": "viewport",
            "visibility": "none",
          },
          paint: {
            "text-color": ["concat", "#", ["get", "text_color"]],
            "text-halo-color": lineColor,
            "text-halo-width": 2,
            "text-halo-blur": 1,
          },
          minzoom: 3,
        });

        map.addLayer({
          id: "ferryshapes",
          type: "line",
          source: "othershapes",
          "source-layer": "data",
          filter: ["all", ["==", 4, ["get", "route_type"]]],
          paint: {
            "line-dasharray": [1, 2],
            "line-color": lineColor,
            "line-width": ["interpolate", ["linear"], ["zoom"], 6, 0.5, 7, 1, 10, 1.5, 14, 3],
            "line-opacity": ["interpolate", ["linear"], ["zoom"], 6, 0.8, 7, 0.9],
          },
          minzoom: 3,
        });

        map.addLayer({
          id: "intercityrailshapes",
          type: "line",
          source: "intercityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            ["any", ["==", 2, ["get", "route_type"]]],
            ["!", ["all", ["==", ["get", "chateau"], "gotransit"], ["==", ["get", "shape_id"], "UNGL"]]],
            [
              "!",
              [
                "all",
                ["==", "amtrak", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-renfe~media~larga~distancia~y~ave", ["get", "chateau"]],
                ["==", "f-ahverkehrsverbund~schleswig~holstein~nah", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              3,
              0.4,
              5,
              0.7,
              7,
              1,
              9,
              2,
              11,
              2.5,
              15,
              3,
              18,
              4,
            ],
            "line-opacity": ["case", ["==", true, ["get", "stop_to_stop_generated"]], 0.2, 0.9],
          },
          minzoom: 3,
        });

        map.addLayer({
          id: "intercityrail-labels",
          type: "symbol",
          source: "intercityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            ["any", ["==", 2, ["get", "route_type"]]],
            ["!", ["all", ["==", ["get", "chateau"], "gotransit"], ["==", ["get", "shape_id"], "UNGL"]]],
            [
              "!",
              [
                "all",
                ["==", "amtrak", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-renfe~media~larga~distancia~y~ave", ["get", "chateau"]],
                ["==", "f-ahverkehrsverbund~schleswig~holstein~nah", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
          ],
          layout: {
            "symbol-placement": "line",
            "text-field": urlParams.get("debug")
              ? ["concat", ["get", "onestop_feed_id"], "|", ["coalesce", ["get", "route_label"]]]
              : ["get", "route_label"],
            "text-font": [
              "step",
              ["zoom"],
              ["literal", ["NotoSans-SemiBold"]],
              7,
              ["literal", ["NotoSans-Bold"]],
            ],
            "text-size": ["interpolate", ["linear"], ["zoom"], 3, 6, 6, 7, 9, 9, 13, 11],
            "text-ignore-placement": false,
            "symbol-spacing": ["step", ["zoom"], 30, 6, 40, 9, 70, 13, 80, 15, 100],
            "text-allow-overlap": false,
            "text-pitch-alignment": "viewport",
            "visibility": "none",
          },
          paint: {
            "text-color": ["concat", "#", ["get", "text_color"]],
            "text-halo-color": lineColor,
            "text-halo-width": 1,
            "text-halo-blur": 1,
          },
          minzoom: 5.5,
        });

        map.addLayer({
          id: "metroshapes",
          type: "line",
          source: "localcityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "any",
              ["==", 1, ["get", "route_type"]],
              ["==", 12, ["get", "route_type"]],
            ],
            [
              "!",
              [
                "all",
                ["==", "nyct", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              6,
              0.5,
              7,
              1,
              9,
              2,
              11,
              2,
              15,
              2.5,
              18,
              3.5,
            ],
            "line-opacity": 1,
          },
          minzoom: 5,
        });

        map.addLayer({
          id: "metro-labels",
          type: "symbol",
          source: "localcityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "any",
              ["==", 1, ["get", "route_type"]],
              ["==", 12, ["get", "route_type"]],
            ],
          ],
          layout: {
            "symbol-placement": "line",
            "text-field": routeLabel,
            "text-font": ["NotoSans-Bold"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 3, 7, 9, 9, 13, 11],
            "text-ignore-placement": false,
            "symbol-spacing": ["step", ["zoom"], 20, 6, 40, 9, 70, 13, 80, 15, 100],
            "text-allow-overlap": false,
            "text-pitch-alignment": "viewport",
            "visibility": "none",
          },
          paint: {
            "text-color": [
              "case",
              ["==", ["get", "color"], "000000"],
              "#ffffff",
              ["concat", "#", ["get", "text_color"]],
            ],
            "text-halo-color": lineColor,
            "text-halo-width": 1,
            "text-halo-blur": 1,
          },
          minzoom: 6,
        });

        map.addLayer({
          id: "tramshapes",
          type: "line",
          source: "localcityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "any",
              ["==", 0, ["get", "route_type"]],
              ["==", 5, ["get", "route_type"]],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Event"],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Silver"],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "nyct", ["get", "chateau"]],
                ["==", true, ["get", "stop_to_stop_generated"]],
              ],
            ],
          ],
          paint: {
            "line-color": lineColor,
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              6,
              0.5,
              7,
              1,
              9,
              2,
              11,
              2,
              15,
              2.2,
              18,
              3.3,
            ],
            "line-opacity": 1,
          },
          minzoom: 5,
        });

        map.addLayer({
          id: "tram-labels",
          type: "symbol",
          source: "localcityrailshapes",
          "source-layer": "data",
          filter: [
            "all",
            [
              "any",
              ["==", 0, ["get", "route_type"]],
              ["==", 5, ["get", "route_type"]],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Event"],
              ],
            ],
            [
              "!",
              [
                "all",
                ["==", "f-9mu-mts", ["get", "onestop_feed_id"]],
                ["==", ["coalesce", ["get", "route_label"]], "Silver"],
              ],
            ],
          ],
          layout: {
            "symbol-placement": "line",
            "text-field": routeLabel,
            "text-font": ["NotoSans-Bold"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 3, 7, 9, 9, 13, 11],
            "text-ignore-placement": false,
            "symbol-spacing": ["step", ["zoom"], 20, 6, 40, 9, 70, 13, 80, 15, 100],
            "text-allow-overlap": false,
            "text-pitch-alignment": "viewport",
            "visibility": "none",
          },
          paint: {
            "text-color": ["concat", "#", ["get", "text_color"]],
            "text-halo-color": lineColor,
            "text-halo-width": 1,
            "text-halo-blur": 1,
          },
          minzoom: 6,
        });
      }

      (async () => {
        const map = new maplibregl.Map({
          container: "map",
          style: await loadStyle(),
          center: [-3.2, 55.95],
          zoom: 9.2,
          hash: true,
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");
        map.on("load", () => addTransitLayers(map));
      })().catch((error) => {
        document.body.innerHTML =
          `<pre style="padding:24px;font:14px/1.5 monospace">` +
          String(error?.stack || error) +
          `</pre>`;
      });
    </script>
  </body>
</html>
