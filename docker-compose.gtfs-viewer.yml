services:
  gtfs-prep:
    build:
      context: .
      dockerfile: Dockerfile.gtfs-prep
    environment:
      GTFS_DIR: /gtfs
      OUTPUT_DIR: /output
      GTFS_FILE: ${GTFS_FILE:-}
    volumes:
      - ${GTFS_HOST_DIR:-./gtfs}:/gtfs:ro
      - gtfs_viewer_data:/output

  viewer:
    image: nginx:alpine
    depends_on:
      gtfs-prep:
        condition: service_completed_successfully
    ports:
      - "8081:80"
    volumes:
      - ./viewer-static/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/static:/usr/share/nginx/html/static:ro
      - gtfs_viewer_data:/usr/share/nginx/html/data:ro

volumes:
  gtfs_viewer_data:
